<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>기후 시각화 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        #map { height: 500px; width: 100%; border-radius: 15px; border: 2px solid #374151; }
    </style>
</head>
<body class="bg-gray-900 text-white p-5">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-400">🌍 세계 기후 시각화 지도</h1>
        <div id="map" class="mb-10 shadow-2xl"></div>
        <div id="info-panel" class="bg-gray-800 p-8 rounded-2xl hidden border border-gray-700">
            <h2 id="city-name" class="text-3xl font-bold mb-4 text-yellow-400"></h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div style="height:300px;"><canvas id="climateChart"></canvas></div>
                <div>
                    <h3 class="text-xl font-semibold mb-3 underline">기후 특징</h3>
                    <p id="climate-desc" class="text-gray-300 leading-relaxed text-lg"></p>
                </div>
            </div>
        </div>
    </div>
    <script>
        // 지도 초기화 (중심 좌표와 확대 레벨)
        const map = L.map('map').setView([20, 10], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const climateData = {
            "서울": { coords: [37.56, 126.97], temp: [-2,0,6,13,18,22,25,26,21,15,7,0], precip: [20,25,47,64,102,133,394,364,169,51,52,21], desc: "냉대 동계 건조 기후(Dwa). 사계절이 뚜렷하며 여름에 강수가 집중됩니다." },
            "런던": { coords: [51.5, -0.12], temp: [5,5,8,10,14,17,19,19,17,13,9,6], precip: [55,40,42,43,46,45,45,49,49,68,59,55], desc: "서안 해양성 기후(Cfb). 연중 비가 고르게 내리고 여름이 선선합니다." },
            "싱가포르": { coords: [1.35, 103.8], temp: [26,27,27,28,28,28,28,28,27,27,27,26], precip: [234,183,185,179,171,130,154,148,163,191,250,269], desc: "열대 우림 기후(Af). 연중 고온다습하며 스콜이 자주 발생합니다." }
        };

        let chartInstance = null;

        Object.keys(climateData).forEach(city => {
            const data = climateData[city];
            L.marker(data.coords).addTo(map).on('click', () => {
                document.getElementById('info-panel').classList.remove('hidden');
                document.getElementById('city-name').innerText = city;
                document.getElementById('climate-desc').innerText = data.desc;

                const ctx = document.getElementById('climateChart').getContext('2d');
                if (chartInstance) chartInstance.destroy();

                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
                        datasets: [
                            { label: '기온(°C)', data: data.temp, type: 'line', borderColor: '#ff6384', yAxisID: 'y1' },
                            { label: '강수량(mm)', data: data.precip, backgroundColor: '#36a2eb', yAxisID: 'y2' }
                        ]
                    },
                    options: { maintainAspectRatio: false, scales: { y1: { position: 'left' }, y2: { position: 'right' } } }
                });
            });
        });
    </script>
</body>
</html>
