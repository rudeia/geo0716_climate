<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koppen Climate Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        #map { height: 450px; width: 100%; border-radius: 1rem; z-index: 1; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 지도 마커 스타일 살짝 변경 */
        .leaflet-popup-content-wrapper { background: #1e293b; color: white; border-radius: 8px; }
        .leaflet-popup-tip { background: #1e293b; }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                    Koppen Climate Lab
                </h1>
                <p class="text-slate-400 mt-2">전 세계 주요 도시의 기후 데이터를 탐색하세요.</p>
            </div>
            <div class="hidden md:block text-right">
                <span class="text-xs bg-slate-800 px-3 py-1 rounded-full border border-slate-700 text-slate-400">Ver 1.0 Live</span>
            </div>
        </header>

        <div class="glass-card p-2 rounded-2xl shadow-2xl mb-8">
            <div id="map"></div>
        </div>

        <div id="info-panel" class="opacity-0 translate-y-4 transition-all duration-500 ease-out">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-1 glass-card p-6 rounded-2xl">
                    <span class="text-blue-400 font-bold text-sm tracking-widest uppercase">City Profile</span>
                    <h2 id="city-name" class="text-4xl font-bold mt-2 mb-4 text-white">도시 선택</h2>
                    <div class="space-y-4">
                        <div>
                            <p class="text-slate-500 text-sm">기후 구분 설명</p>
                            <p id="climate-desc" class="text-slate-300 leading-relaxed mt-1 italic"></p>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2 glass-card p-6 rounded-2xl min-h-[400px]">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-bold">Climate Graph (Climograph)</h3>
                        <div class="flex gap-4 text-xs">
                            <span class="flex items-center gap-1"><span class="w-3 h-3 bg-red-500 rounded-full"></span> 기온</span>
                            <span class="flex items-center gap-1"><span class="w-3 h-3 bg-blue-500 rounded-full"></span> 강수량</span>
                        </div>
                    </div>
                    <div class="h-[300px]">
                        <canvas id="climateChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 지도 설정
        const map = L.map('map', { zoomControl: false }).setView([20, 10], 2);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 어두운 테마의 지도 타일 사용 (옵션: 기본도 예쁘지만 어두운 톤이 잘 어울림)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        const climateData = {
            "Seoul": { coords: [37.56, 126.97], temp: [-2.4,-0.4,5.7,12.5,17.8,22.2,24.9,25.7,21.2,14.8,7.2,0.4], precip: [20.8,25,47.3,64.5,102.2,133.2,394.7,364.2,169.3,51.8,52.5,21.5], desc: "냉대 동계 건조 기후(Dwa). 사계절이 뚜렷하며, 여름철 몬순의 영향으로 강수량이 매우 많고 고온다습합니다." },
            "London": { coords: [51.50, -0.12], temp: [5.2,5.3,7.6,9.9,13.3,16.5,18.7,18.5,15.7,12,8.4,5.9], precip: [55.2,40.9,41.6,43.7,46.3,44.6,44.6,49.5,49.1,68.5,59,55.2], desc: "서안 해양성 기후(Cfb). 편서풍의 영향으로 연중 강수가 고르며, 여름은 선선하고 겨울은 위도에 비해 따뜻합니다." },
            "Singapore": { coords: [1.35, 103.81], temp: [26.5,27.1,27.5,28,28.3,28.3,27.9,27.9,27.6,27.6,27,26.4], precip: [234,183,185,179,171,130,154,148,163,191,250,269], desc: "열대 우림 기후(Af). 적도 수렴대의 영향으로 연중 고온다습하며, 계절의 변화보다 일교차가 더 큰 것이 특징입니다." }
        };

        let myChart = null;

        Object.keys(climateData).forEach(city => {
            const data = climateData[city];
            const marker = L.circleMarker(data.coords, {
                radius: 8,
                fillColor: "#60a5fa",
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);
            
            marker.on('click', () => {
                const panel = document.getElementById('info-panel');
                panel.classList.remove('opacity-0', 'translate-y-4');
                panel.classList.add('opacity-100', 'translate-y-0');

                document.getElementById('city-name').innerText = city;
                document.getElementById('climate-desc').innerText = data.desc;

                const ctx = document.getElementById('climateChart').getContext('2d');
                if (myChart) myChart.destroy();

                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
                        datasets: [
                            {
                                label: '기온 (°C)',
                                data: data.temp,
                                type: 'line',
                                borderColor: '#f87171',
                                borderWidth: 3,
                                pointBackgroundColor: '#f87171',
                                tension: 0.4, // 곡선 효과
                                yAxisID: 'y-temp'
                            },
                            {
                                label: '강수량 (mm)',
                                data: data.precip,
                                backgroundColor: 'rgba(59, 130, 246, 0.5)',
                                borderRadius: 5,
                                yAxisID: 'y-precip'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            'y-temp': { type: 'linear', position: 'left', grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#f87171' } },
                            'y-precip': { type: 'linear', position: 'right', grid: { display: false }, ticks: { color: '#3b82f6' } },
                            x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
