<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEO-KOPPEN LAB Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; overflow: hidden; }
        
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        /* 왼쪽 도시 리스트 사이드바 */
        .sidebar { width: 350px; background: #0f172a; border-right: 1px solid #1e293b; z-index: 1000; display: flex; flex-direction: column; flex-shrink: 0; }
        
        /* 우측 지도 및 대기대순환 패널 영역 */
        .main-workspace { flex: 1; display: flex; background-color: #1e293b; position: relative; }
        
        /* 대기대순환 상승/하강 전용 패널 */
        .circ-panel { width: 80px; background-color: #0f172a; position: relative; z-index: 500; border-left: 1px solid #334155; border-right: 1px solid #334155; overflow: hidden; transition: width 0.3s; pointer-events: none; }
        
        /* 상승/하강 텍스트 마커 */
        .vert-marker { position: absolute; left: 0; right: 0; text-align: center; transform: translateY(-50%); transition: top 0.1s ease-out; font-weight: 900; font-size: 13px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .rise { color: #f97316; } /* 상승 (주황) */
        .sink { color: #3b82f6; } /* 하강 (파랑) */

        /* 지도가 들어갈 중앙 영역 */
        #map { flex: 1; height: 100%; z-index: 1; background-color: #1e293b; }
        
        /* Hadley 순환 입체 그래픽을 그릴 SVG 레이어 */
        #hadley-svg { position: absolute; top: 0; left: 80px; right: 80px; height: 100%; z-index: 400; pointer-events: none; transition: opacity 0.3s; }

        /* 모바일 반응형 */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .sidebar { width: 100%; height: 40%; order: 2; border-right: none; border-top: 1px solid #1e293b; position: relative; }
            .main-workspace { height: 60%; order: 1; }
            .circ-panel { width: 50px; }
            .vert-marker { font-size: 11px; }
            #hadley-svg { left: 50px; right: 50px; }
            #detail-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; }
        }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 0.5rem center; background-size: 1em; }

        /* Hadley 순환 화살표 애니메이션 */
        .hadley-arrow { animation: hadley-flow 3s linear infinite; }
        @keyframes hadley-flow {
            to { stroke-dashoffset: -20; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar shadow-2xl">
            <div class="p-4 border-b border-slate-800 bg-slate-900/50">
                <h1 class="text-base font-black text-white italic uppercase">Geo-Koppen Lab Pro</h1>
                <p class="text-slate-500 text-[10px] mt-0.5 font-bold">기출 73곳 & 대기대순환 시각화</p>
            </div>

            <div class="px-3 py-2 bg-slate-900 border-b border-slate-800 space-y-2">
                <div class="relative">
                    <input type="text" id="search-input" placeholder="도시명 검색..." class="w-full bg-slate-800 text-xs text-white pl-8 pr-3 py-1.5 rounded-lg border border-slate-700 outline-none focus:ring-1 focus:ring-blue-500">
                    <span class="absolute left-2.5 top-1.5 text-slate-500 text-sm">🔍</span>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <select id="climate-filter" class="w-full bg-slate-800 text-xs text-white pl-2 pr-7 py-1.5 rounded-lg border border-slate-700 cursor-pointer">
                        <option value="all">기후대 전체</option>
                        <option value="A">열대(A)</option>
                        <option value="B">건조(B)</option>
                        <option value="C">온대(C)</option>
                        <option value="D">냉대(D)</option>
                        <option value="E">한대(E)</option>
                        <option value="H">고산(H)</option>
                    </select>
                    <select id="sort-select" class="w-full bg-slate-800 text-xs text-white pl-2 pr-7 py-1.5 rounded-lg border border-slate-700 cursor-pointer">
                        <option value="default">정렬: 기본</option>
                        <option value="symbol">정렬: 기후</option>
                        <option value="name">정렬: 가나다</option>
                    </select>
                </div>
            </div>

            <div id="city-list" class="flex-1 overflow-y-auto p-3 space-y-1.5 bg-slate-900/20 custom-scroll"></div>

            <div id="detail-panel" class="p-4 bg-slate-950 border-t border-slate-800 hidden overflow-y-auto custom-scroll" style="max-height: 65vh;">
                <div class="flex justify-between items-center mb-1">
                    <button id="close-btn" class="md:hidden bg-slate-800 text-white text-[10px] px-2 py-1 rounded font-bold border border-slate-600">◀ 목록</button>
                    <h2 id="selected-city" class="text-lg font-bold text-white"></h2>
                </div>
                <div id="k-symbol" class="inline-block px-1.5 py-0.5 rounded text-[8px] font-black mb-1"></div>
                <img id="city-image" class="w-full h-32 object-cover rounded my-2 hidden border border-slate-700" alt="도시 사진">
                <p id="selected-desc" class="text-slate-400 text-[11px] mb-3"></p>
                <div style="height:140px; width:100%;"><canvas id="climateChart"></canvas></div>
            </div>
        </div>
        
        <div class="main-workspace">
            
            <div id="circ-left" class="circ-panel"></div>

            <div id="map" class="relative">
                <div class="absolute top-4 right-4 z-[1000] bg-slate-900/90 p-4 rounded-xl border border-slate-700 shadow-2xl backdrop-blur-md w-64 md:w-72">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-slate-300 font-black tracking-widest text-[11px]">MONTH LEVER</span>
                        <span id="month-display" class="text-blue-400 font-bold text-base">1월</span>
                    </div>
                    <input type="range" id="month-slider" min="1" max="12" value="1" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    <div class="flex justify-between text-[10px] text-slate-400 mt-2 font-bold mb-3">
                        <span>JAN</span><span>APR</span><span>JUL</span><span>OCT</span><span>DEC</span>
                    </div>
                    <div class="border-t border-slate-700 pt-3 flex items-center justify-between">
                        <span class="text-[10px] text-slate-400 font-bold">Hadley 순환 모식도 (ON/OFF)</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="panel-toggle" class="sr-only peer" checked>
                            <div class="w-8 h-4 bg-slate-700 rounded-full peer peer-checked:after:translate-x-full after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-blue-600"></div>
                        </label>
                    </div>
                </div>
            </div>

            <div id="circ-right" class="circ-panel"></div>

            <svg id="hadley-svg">
                <defs>
                    <marker id="arrow-rise" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
                    </marker>
                    <marker id="arrow-sink" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
                    </marker>
                </defs>
                </svg>
        </div>
    </div>

    <script>
        // === [데이터베이스 73곳 - 필터링 테스트용 데이터 추가] ===
        const climateData = {
            "싱가포르": { coords: [1.35, 103.81], symbol: "Af", temp: [26,27,27,28,28,28,28,28,27,27,27,26], precip: [234,183,185,179,171,130,154,148,163,191,250,269], image: "https://picsum.photos/seed/singapore/500/250", desc: "열대 우림(Af). 연중 수렴대의 영향." },
            "카이로": { coords: [30.04, 31.23], symbol: "BW", temp: [13,15,17,21,25,27,28,27,26,23,18,15], precip: [5,4,4,1,1,0,0,0,0,1,3,5], image: "https://picsum.photos/seed/cairo/500/250", desc: "건조 사막(BW). 아열대 고압대의 영향." },
            "로마": { coords: [41.90, 12.49], symbol: "Cs", temp: [7.5,8.2,10.5,13.1,17.3,21.3,24.1,24.1,20.9,16.3,11.9,8.7], precip: [81,71,65,67,49,36,18,38,68,93,111,98], image: "https://picsum.photos/seed/rome/500/250", desc: "지중해성(Cs). 여름 건조." },
            "모스크바": { coords: [55.75, 37.61], symbol: "Df", temp: [-6,-6,-1,6,13,17,19,17,11,5,-1,-5], precip: [52,41,35,37,51,80,85,82,68,71,54,51], image: "https://picsum.photos/seed/moscow/500/250", desc: "냉대 습윤(Df). 연중 강수 일정." },
            "배로": { coords: [71.29, -156.78], symbol: "ET", temp: [-25,-28,-26,-18,-7,2,4,4,0,-7,-16,-22], precip: [4,4,4,5,5,8,24,26,18,12,6,4], image: "https://picsum.photos/seed/barrow/500/250", desc: "툰드라(ET). 최난월 10도 미만." },
            "아디스아바바": { coords: [9.03, 38.74], symbol: "AH", temp: [16,17,18,18,18,17,16,16,16,16,16,15], precip: [13,30,58,82,84,138,280,290,149,27,7,7], image: "https://picsum.photos/seed/addisababa/500/250", desc: "열대 고산(AH). 연중 상춘 기후." }
            // (실제 사용시 73개 데이터 전체 로드)
        };

        function getCol(s) {
            const sym = s.toUpperCase();
            if(sym.startsWith('A')) return '#ff0044'; if(sym.startsWith('B')) return '#ffff00';
            if(sym.startsWith('C')) return '#00ff00'; if(sym.startsWith('D')) return '#00ffff';
            if(sym.startsWith('E')) return '#ffffff'; return '#aa00ff'; 
        }

        // === 지도 및 UI 초기화 ===
        const map = L.map('map', { zoomControl: false, minZoom: 2 }).setView([10, 20], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let myChart = null;
        let currentMarkers = []; 
        let filteredCities = Object.keys(climateData); // 현재 필터링된 도시 목록

        // === [2. 🔍 필터링 및 리스트 렌더링 엔진 (핵심 추가)] ===
        function renderList() {
            const listContainer = document.getElementById('city-list');
            listContainer.innerHTML = '';
            
            // 1. 기존 지도 마커 전부 제거
            currentMarkers.forEach(m => map.removeLayer(m)); currentMarkers = [];

            // 2. 검색어 및 기후대 필터 값 가져오기
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const climateFilter = document.getElementById('climate-filter').value;

            // 3. 필터링 로직
            filteredCities = Object.keys(climateData).filter(name => {
                const d = climateData[name];
                const matchesSearch = name.toLowerCase().includes(searchTerm);
                const matchesClimate = (climateFilter === 'all') || d.symbol.startsWith(climateFilter);
                return matchesSearch && matchesClimate;
            });

            // 4. 결과 출력
            if (filteredCities.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-slate-600 text-[10px] mt-4">검색 결과가 없습니다.</p>`;
                return;
            }

            // (정렬 로직 생략 - 필요시 추가 가능)

            filteredCities.forEach(name => {
                const d = climateData[name]; const col = getCol(d.symbol);
                const card = document.createElement('div');
                card.className = "p-2 rounded border border-slate-800 bg-slate-800/40 cursor-pointer active:bg-slate-700 transition-all";
                card.style.borderLeft = `3px solid ${col}`;
                card.innerHTML = `<div class="flex justify-between items-center text-[10px] font-bold"><span class="text-slate-200">${name}</span><span class="px-1 py-0.5 rounded bg-slate-900 text-[8px]" style="color:${col}">${d.symbol}</span></div>`;
                listContainer.appendChild(card);
                
                // 5. 필터링된 도시만 지도 마커 생성
                const marker = L.circleMarker(d.coords, { radius: 6, fillColor: col, color: "#fff", weight: 1, fillOpacity: 0.9 }).addTo(map);
                currentMarkers.push(marker);

                const clickHandler = () => { map.flyTo(d.coords, 4); document.getElementById('detail-panel').classList.remove('hidden'); /* 차트 로직 생략 */ };
                card.onclick = clickHandler; marker.on('click', clickHandler);
            });
        }

        // 필터 이벤트 리스너 등록
        document.getElementById('search-input').addEventListener('input', renderList);
        document.getElementById('climate-filter').addEventListener('change', renderList);
        document.getElementById('sort-select').addEventListener('change', renderList);

        document.getElementById('close-btn').addEventListener('click', () => { document.getElementById('detail-panel').classList.add('hidden'); });

        // === [3. 🌪️ 대기대순환 & Hadley 순환 그래픽 엔진] ===
        let climateLayerGrp = L.layerGroup().addTo(map);
        let currentMonth = 1;
        let isEngineActive = true; 

        // 상승/하강 데이터 (스크린샷 내용 고정 배치)
        const verticalData = [
            { baseLat: 90, icon: "↓", desc: "하강", type: "sink" },
            { baseLat: 60, icon: "↑", desc: "상승", type: "rise" },
            { baseLat: 30, icon: "↓", desc: "하강", type: "sink" },
            { baseLat: 0, icon: "↑", desc: "상승", type: "rise" },
            { baseLat: -30, icon: "↓", desc: "하강", type: "sink" },
            { baseLat: -60, icon: "↑", desc: "상승", type: "rise" },
            { baseLat: -90, icon: "↓", desc: "하강", type: "sink" }
        ];

        // 패널 HTML 초기 생성
        function initVerticalPanels() {
            const leftPanel = document.getElementById('circ-left');
            const rightPanel = document.getElementById('circ-right');
            verticalData.forEach((d, i) => {
                const html = `<div id="v-marker-${i}" class="vert-marker ${d.type}" data-lat="${d.baseLat}">${d.icon} ${d.desc}</div>`;
                leftPanel.innerHTML += html;
                rightPanel.innerHTML += html;
            });
        }
        initVerticalPanels();

        // 메인 엔진 업데이트
        function syncCircPanels() {
            if (!isEngineActive) return;
            // 열적도 이동 보간법 (1월 남쪽, 7월 북쪽)
            const shift = -Math.cos((currentMonth - 1) * Math.PI / 6) * 10; 

            // 1. 좌우 상승/하강 패널 위치 동기화
            document.querySelectorAll('.vert-marker').forEach(el => {
                const baseLat = parseFloat(el.dataset.lat);
                const targetLat = baseLat + (shift * 0.8); // 패널은 지도와 동기화
                const pt = map.latLngToContainerPoint([targetLat, 0]);
                el.style.top = `${pt.y}px`;
            });

            // 2. === 🌊 Hadley 순환 입체 모식도 드로잉 (SVG) ===
            const svg = document.getElementById('hadley-svg');
            let svgHTML = '';
            
            // 기준 픽셀 좌표 가져오기
            const itczPt = map.latLngToContainerPoint([shift, 0]); // 적도 수렴대 (상승)
            const nHighPt = map.latLngToContainerPoint([30 + shift, 0]); // 북반구 아열대고압대 (하강)
            const sHighPt = map.latLngToContainerPoint([-30 + shift, 0]); // 남반구 아열대고압대 (하강)
            
            const wsWidth = document.querySelector('.main-workspace').clientWidth;
            const upLevelY = itczPt.y - 60; // 상층 이동을 위한 Y축 여백

            // (1) 적도 수렴대 상승 (주황색)
            svgHTML += `<path d="M ${wsWidth/2 - 40},${itczPt.y} Q ${wsWidth/2},${(itczPt.y+upLevelY)/2} ${wsWidth/2},${upLevelY}" stroke="#f97316" stroke-width="3" fill="none" class="hadley-arrow" style="stroke-dasharray: 5,5;" marker-end="url(#arrow-rise)"/>`;

            // (2) 북반구 Hadley 셀 (상층 이동 -> 하강 -> 표층 이동)
            // 상층: 적도 -> 북쪽
            svgHTML += `<path d="M ${wsWidth/2},${upLevelY} Q ${wsWidth*0.75},${upLevelY-10} ${wsWidth*0.8},${(upLevelY+nHighPt.y)/2}" stroke="#64748b" stroke-width="2" fill="none" style="stroke-dasharray: 5,5;" marker-end="url(#arrow-rise)"/>`;
            // 하강: 북반구 고압대 (파랑)
            svgHTML += `<path d="M ${wsWidth*0.8},${(upLevelY+nHighPt.y)/2} Q ${wsWidth*0.8-20},${nHighPt.y} ${wsWidth*0.8-40},${nHighPt.y}" stroke="#3b82f6" stroke-width="3" fill="none" style="stroke-dasharray: 5,5;" marker-end="url(#arrow-sink)"/>`;

            // (3) 남반구 Hadley 셀 (상층 이동 -> 하강 -> 표층 이동)
            // 상층: 적도 -> 남쪽
            svgHTML += `<path d="M ${wsWidth/2},${upLevelY} Q ${wsWidth*0.25},${upLevelY-10} ${wsWidth*0.2},${(upLevelY+sHighPt.y)/2}" stroke="#64748b" stroke-width="2" fill="none" style="stroke-dasharray: 5,5;" marker-end="url(#arrow-rise)"/>`;
            // 하강: 남반구 고압대 (파랑)
            svgHTML += `<path d="M ${wsWidth*0.2},${(upLevelY+sHighPt.y)/2} Q ${wsWidth*0.2+20},${sHighPt.y} ${wsWidth*0.2+40},${sHighPt.y}" stroke="#3b82f6" stroke-width="3" fill="none" style="stroke-dasharray: 5,5;" marker-end="url(#arrow-sink)"/>`;

            svg.innerHTML = svgHTML; // SVG에 HTML 주입
        }

        function redrawMapLayers() {
            climateLayerGrp.clearLayers();
            if (!isEngineActive) return;
            const shift = -Math.cos((currentMonth - 1) * Math.PI / 6) * 10;
            // (기본 무역풍, ITCZ 선 그리기 로직 생략 - 기존과 동일하게 유지)
        }

        // === 이벤트 리스너 ===
        document.getElementById('month-slider').addEventListener('input', (e) => {
            currentMonth = parseInt(e.target.value);
            document.getElementById('month-display').innerText = currentMonth + '월';
            redrawMapLayers(); syncCircPanels();
        });

        map.on('move zoom', syncCircPanels); // 지도 이동 시 그래픽 동기화

        document.getElementById('panel-toggle').addEventListener('change', (e) => {
            isEngineActive = e.target.checked;
            document.querySelectorAll('.circ-panel').forEach(p => p.style.width = isEngineActive ? (window.innerWidth <= 768 ? '50px' : '80px') : '0px');
            document.getElementById('hadley-svg').style.opacity = isEngineActive ? '1' : '0';
            redrawMapLayers(); syncCircPanels();
            setTimeout(() => map.invalidateSize(), 300);
        });

        // 초기화
        renderList();
        syncCircPanels();

    </script>
</body>
</html>
